spring:
  application:
    name: ai-demo
  datasource:
    url: jdbc:mysql://localhost:3307/spring-jpa?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: a123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update          # 自动创建/更新表结构，生产环境慎用
    show-sql: true              # 打印 SQL 语句
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true        # 格式化 SQL